<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Darts App</title>
    <style>
        :root {
            --primary: #1a472a; /* Field Green */
            --accent: #ffd700; /* Gold */
            --text: #f0f0f0;
            --danger: #d32f2f;
            --dark: #121212;
            --panel: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1, h2, h3 { margin: 0.5em 0; text-transform: uppercase; letter-spacing: 1px; }

        /* Setup Screen */
        #setup-screen {
            background: var(--panel);
            padding: 2rem;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
        }

        input {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid #555;
            background: #333;
            color: white;
            font-size: 1rem;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            margin: 5px;
        }

        button:hover { filter: brightness(1.1); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.danger { background: var(--danger); }
        button.accent { background: var(--accent); color: #000; }

        /* Game Screen */
        #game-screen {
            display: none;
            width: 100%;
            max-width: 800px;
            flex-direction: column;
            gap: 15px;
        }

        /* Scoreboard */
        .scoreboard {
            display: flex;
            justify-content: space-between;
            background: var(--panel);
            padding: 15px;
            border-radius: 8px;
            border-bottom: 4px solid var(--accent);
        }

        .team-score {
            text-align: center;
            flex: 1;
        }

        .score-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent);
        }

        .timer-display {
            font-size: 1.5rem;
            font-weight: bold;
            background: #000;
            padding: 5px 15px;
            border-radius: 5px;
            margin: 0 10px;
            min-width: 80px;
            text-align: center;
            color: #fff;
        }

        /* The Field Visualization */
        .field-container {
            background: var(--primary);
            border-radius: 10px;
            padding: 10px;
            position: relative;
            height: 120px;
            overflow: hidden;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .endzone {
            width: 60px;
            height: 100%;

            display: flex;
