<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Darts App</title>
    <style>
        :root {
            --primary: #1a472a; /* Field Green */
            --accent: #ffd700; /* Gold */
            --text: #f0f0f0;
            --danger: #d32f2f;
            --dark: #121212;
            --panel: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1, h2, h3 { margin: 0.5em 0; text-transform: uppercase; letter-spacing: 1px; }

        /* Setup Screen */
        #setup-screen {
            background: var(--panel);
            padding: 2rem;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
        }

        input {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid #555;
            background: #333;
            color: white;
            font-size: 1rem;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            margin: 5px;
        }

        button:hover { filter: brightness(1.1); }
        button.danger { background: var(--danger); }
        button.accent { background: var(--accent); color: #000; }

        /* Game Screen */
        #game-screen {
            display: none;
            width: 100%;
            max-width: 800px;
            flex-direction: column;
            gap: 15px;
        }

        /* Scoreboard */
        .scoreboard {
            display: flex;
            justify-content: space-between;
            background: var(--panel);
            padding: 15px;
            border-radius: 8px;
            border-bottom: 4px solid var(--accent);
        }

        .team-score {
            text-align: center;
            flex: 1;
        }

        .score-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent);
        }

        .timer-display {
            font-size: 1.5rem;
            font-weight: bold;
            background: #000;
            padding: 5px 15px;
            border-radius: 5px;
            margin: 0 10px;
            min-width: 80px;
            text-align: center;
        }

        /* The Field Visualization */
        .field-container {
            background: var(--primary);
            border-radius: 10px;
            padding: 10px;
            position: relative;
            height: 120px;
            overflow: hidden;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .endzone {
            width: 60px;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            color: rgba(255,255,255,0.6);
            font-weight: bold;
        }

        .field-markers {
            flex-grow: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            position: relative;
        }

        .possession-marker {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid #fff;
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: left 0.5s ease;
            box-shadow: 0 0 10px var(--accent);
        }

        .yard-line {
            height: 100%;
            width: 1px;
            background: rgba(255,255,255,0.2);
            position: relative;
        }
        
        .yard-line::after {
            content: attr(data-yard);
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
        }

        /* Controls */
        .controls {
            background: var(--panel);
            padding: 15px;
            border-radius: 8px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .status-panel {
            grid-column: span 2;
            background: #222;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            font-style: italic;
            border-left: 4px solid var(--accent);
        }

        .dart-input-group {
            grid-column: span 2;
            display: flex;
            gap: 10px;
        }

        select {
            flex: 1;
            padding: 10px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
        }

        /* Down and Distance */
        .game-info {
            display: flex;
            justify-content: space-around;
            background: #222;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .highlight { color: var(--accent); font-weight: bold; }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: var(--panel);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup-screen">
        <h1>Football Darts</h1>
        <p>Enter Team Names to Start</p>
        <input type="text" id="teamLeftName" placeholder="Left Team Name" value="Home">
        <input type="text" id="teamRightName" placeholder="Right Team Name" value="Away">
        <br>
        <button onclick="startGame()">Kickoff</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen">
        <!-- Scoreboard -->
        <div class="scoreboard">
            <div class="team-score">
                <div id="scoreLeftName">Home</div>
                <div class="score-display" id="scoreLeft">0</div>
            </div>
            <div class="timer-display" id="gameTimer">20:00</div>
            <div class="team-score">
                <div id="scoreRightName">Away</div>
                <div class="score-display" id="scoreRight">0</div>
            </div>
        </div>

        <!-- Field Visualization -->
        <div class="field-container">
            <div class="endzone" id="endzoneLeft">LEFT<br>ENDZONE</div>
            <div class="field-markers" id="fieldMarkers">
                <!-- Generated by JS -->
            </div>
            <div class="endzone" id="endzoneRight">RIGHT<br>ENDZONE</div>
            <div class="possession-marker" id="ballMarker" style="left: 50%;"></div>
        </div>

        <!-- Game Info -->
        <div class="game-info">
            <span>Quarter: <span id="quarterDisplay" class="highlight">1</span></span>
            <span>Down: <span id="downDisplay" class="highlight">1</span></span>
            <span>To Go: <span id="toGoDisplay" class="highlight">10</span></span>
            <span>Ball On: <span id="ballOnDisplay" class="highlight">50</span></span>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="status-panel" id="statusPanel">
                Select your throw result to proceed.
            </div>

            <div class="dart-input-group">
                <select id="segmentSelect">
                    <option value="" disabled selected>Hit Segment...</option>
                    <option value="D20">Double 20 (Endzone)</option>
                    <option value="S20">Single 20</option>
                    <option value="T20">Triple 20</option>
                    <option value="S1">Single 1</option>
                    <option value="T1">Triple 1</option>
                    <option value="D1">Double 1</option>
                    <option value="BULL">Bullseye (50)</option>
                    <option value="S5">Single 5</option>
                    <option value="T5">Triple 5</option>
                    <option value="S10">Single 10</option>
                    <option value="T10">Triple 10</option>
                    <option value="S13">Single 13</option>
                    <option value="T13">Triple 13</option>
                    <option value="D13">Double 13</option>
                    <option value="S11">Single 11</option>
                    <option value="T11">Triple 11</option>
                    <option value="D11">Double 11</option>
                    <option value="S8">Single 8</option>
                    <option value="T8">Triple 8</option>
                    <option value="D8">Double 8</option>
                    <option value="S6">Single 6</option>
                    <option value="T6">Triple 6</option>
                    <option value="D6">Double 6</option>
                    <option value="MISS">Miss / Bust</option>
                </select>
                <button onclick="processThrow()">Throw</button>
            </div>

            <!-- Action Buttons (Hidden by default) -->
            <div id="actionButtons" style="grid-column: span 2; display: none; flex-direction: column; gap: 5px;">
                <p style="margin:0; font-size:0.9rem;">Extra Point Opportunity!</p>
                <button class="accent" onclick="handleExtraPoint('kick')">Kick XP (Hit Any 20)</button>
                <button onclick="handleExtraPoint('2pt')">Go for 2 (Hit T20)</button>
                <button onclick="handleExtraPoint('no')">No Conversion</button>
            </div>

            <div id="fgButtons" style="grid-column: span 2; display: none; flex-direction: column; gap: 5px;">
                <p style="margin:0; font-size:0.9rem;">4th Down Decision</p>
                <button class="accent" onclick="attemptFG()">Kick Field Goal</button>
                <button onclick="goForIt()">Go for it (1 Throw)</button>
                <button onclick="punt()">Punt (Turnover)</button>
            </div>
        </div>
    </div>

    <!-- MODAL FOR SCORING -->
    <div id="scoreModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Touchdown!</h2>
            <p id="modalMsg">Do you want to kick the extra point?</p>
            <div class="modal-buttons" id="modalButtons">
                <!-- Dynamic buttons -->
            </div>
        </div>
    </div>

    <script>
        // --- GAME STATE ---
        const state = {
            teams: { left: "Home", right: "Away" },
            scores: { left: 0, right: 0 },
            possession: 'left', // 'left' or 'right'
            ballPosition: 50, // 0-100. 0=Left Endzone, 50=Middle, 100=Right Endzone
            quarter: 1,
            timeRemaining: 1200, // 20 minutes in seconds
            down: 1,
            yardsToGo: 10,
            // Target line relative to current possession
            // If Left has ball, target is higher number. If Right, target is lower.
            targetLine: 60, 
            
            // Flow control
            waitingForConversion: false,
            waitingFor4thDown: false,
            lastScoringPlay: null, // 'td', 'fg'
            
            // Segment mapping logic
            // Left Team (0 -> 100): D20(0) -> S20(10) -> T20(20) -> S1(30) -> D1(40) -> BULL(50) -> D1(60) -> S1(70) -> T20(80) -> S20(90) -> D20(100)
            // Right Team (100 -> 0): D20(100) -> S20(90) -> T20(80) -> S1(70) -> D1(60) -> BULL(50) -> D1(40) -> S1(30) -> T20(20) -> S20(10) -> D20(0)
            
            // Simplified mapping: 
            // We will map dart hits to "Yards Gained" or "Yards from Goal"
            // But the prompt says: "Own double, outer single, triple, inner single, bullseye, inner single, triple, outer single and double"
            // This implies a sequence.
            // Let's map specific darts to specific segments of the field.
            
            fieldSegments: [
                { name: "Double", val: 0 }, // End
